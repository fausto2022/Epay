# ============================================
# 彩虹易支付 (Epay) Docker 一键部署
# ============================================
#
# 快速开始：
#   1. 复制 env.example 为 .env 并修改数据库密码
#      cp env.example .env
#   2. 初始化 bepusdt 插件子模块（如果需要）
#      git submodule update --init --recursive
#   3. 启动所有服务
#      docker compose up -d
#   4. 浏览器访问 http://服务器IP:8090 进行安装
#      数据库地址填 "db"（不是 localhost）
#   5. 安装完成后创建安装锁
#      touch ./install/install.lock
#
# 管理命令：
#   docker compose logs -f          # 查看实时日志
#   docker compose restart php      # 重启 PHP
#   docker compose down             # 停止所有服务
#   docker compose down -v          # 停止并清除数据库（慎用）
#

services:
  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:alpine
    container_name: epay-nginx
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - epay-net

  # ---- PHP 8.2-FPM ----
  php:
    build: .
    container_name: epay-php
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epay-net

  # ---- MySQL 8.0 ----
  db:
    image: mysql:8.0
    container_name: epay-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root2026secure}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-epay}
      MYSQL_USER: ${MYSQL_USER:-epay}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-epay2026secure}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=64M
      --max-connections=200
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - epay-net

volumes:
  mysql_data:
    name: epay-mysql-data

networks:
  epay-net:
    driver: bridge
